id = "sre"
name = "SRE Hand"
description = "Autonomous Site Reliability Engineer — monitors infrastructure health, investigates incidents, optimizes costs, and enforces SLOs across AWS and Google Cloud"
category = "productivity"
icon = "\U0001F6E0"
tools = ["shell_exec", "file_read", "file_write", "file_list", "web_fetch", "web_search", "memory_store", "memory_recall", "schedule_create", "schedule_list", "schedule_delete", "knowledge_add_entity", "knowledge_add_relation", "knowledge_query", "event_publish"]

# ─── Requirements ─────────────────────────────────────────────────────────────

[[requires]]
key = "aws_cli"
label = "AWS CLI must be installed"
requirement_type = "binary"
check_value = "aws"
description = "The AWS CLI is used to query CloudWatch metrics, inspect ECS/EKS clusters, check IAM policies, and manage infrastructure state."

[requires.install]
macos = "brew install awscli"
windows = "winget install Amazon.AWSCLI"
linux_apt = "sudo apt install awscli"
linux_dnf = "sudo dnf install awscli2"
linux_pacman = "sudo pacman -S aws-cli-v2"
pip = "pip install awscli"
manual_url = "https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
estimated_time = "2-5 min"

[[requires]]
key = "gcloud"
label = "Google Cloud SDK must be installed"
requirement_type = "binary"
check_value = "gcloud"
description = "The gcloud CLI is used to query Cloud Monitoring, inspect GKE clusters, check IAM bindings, and manage GCP resources."

[requires.install]
macos = "brew install google-cloud-sdk"
windows = "winget install Google.CloudSDK"
linux_apt = "sudo apt install google-cloud-cli"
manual_url = "https://cloud.google.com/sdk/docs/install"
estimated_time = "3-5 min"

